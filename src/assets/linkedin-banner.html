<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jakub Aniszewski LinkedIn Banner</title>
    <style>
      :root {
        --bg: #17181d;
        --panel: rgba(39, 39, 42, 0.78);
        --line: rgba(113, 113, 122, 0.42);
        --line-soft: rgba(82, 82, 91, 0.68);
        --text: #fafafa;
        --muted: #b4b4be;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        font-family: "Inter", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .banner {
        position: relative;
        width: 3168px;
        height: 792px;
        overflow: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.044) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.044) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.075) 0%, rgba(255, 255, 255, 0.018) 36%, transparent 76%),
          linear-gradient(135deg, #22232a 0%, #17181d 46%, #202127 100%),
          var(--bg);
        background-size:
          96px 96px,
          96px 96px,
          auto,
          auto,
          auto;
        color: var(--text);
      }

      .banner::before {
        content: "";
        position: absolute;
        inset: 48px;
        border: 1px solid var(--line-soft);
        border-radius: 44px;
        pointer-events: none;
      }

      .content {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: 1fr auto;
        align-items: center;
        justify-items: end;
        row-gap: 44px;
        padding: 92px 190px 104px 900px;
      }

      .copy {
        width: min(100%, 1760px);
        display: grid;
        justify-items: end;
        gap: 28px;
        text-align: right;
      }

      h1 {
        margin: 0;
        font-size: 188px;
        line-height: 0.98;
        letter-spacing: -0.04em;
        font-weight: 800;
        color: #ffffff;
      }

      .role {
        color: var(--muted);
        font-size: 68px;
        line-height: 1;
        letter-spacing: -0.025em;
        font-weight: 600;
        text-transform: lowercase;
      }

      .certification {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 22px;
        min-height: 136px;
        padding: 14px 36px 14px 16px;
        border: 1px solid var(--line-soft);
        border-radius: 999px;
        background: var(--panel);
        text-align: left;
        opacity: 0.92;
      }

      .badge-frame {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 108px;
        height: 108px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: #ffffff;
      }

      .badge {
        width: 100px;
        height: 100px;
        object-fit: cover;
        display: block;
        border-radius: 999px;
      }

      .certification-copy {
        display: grid;
        gap: 8px;
      }

      .certification-kicker {
        margin: 0;
        color: #71717a;
        font-size: 24px;
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .certification-title {
        margin: 0;
        color: #f4f4f5;
        font-size: 40px;
        line-height: 1;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
    </style>
  </head>
  <body>
    <main class="banner">
      <section class="content">
        <div class="copy">
          <h1>aniszewski.com</h1>
          <div class="role">software engineer</div>
        </div>

        <div class="certification" aria-label="Google Cloud Professional Cloud Developer">
          <div class="badge-frame">
            <img
              class="badge"
              src="./professional-cloud-developer-certification.png"
              alt="Google Cloud Professional Cloud Developer badge"
            />
          </div>
          <div class="certification-copy">
            <p class="certification-kicker">Google Cloud</p>
            <p class="certification-title">Professional Cloud Developer</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
